name: Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CARGO_PROFILE_RELEASE_LTO: thin

jobs:
  linux-cpu-x64:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build
        run: |
          cargo build --release --features mkl --target x86_64-unknown-linux-gnu

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        run: |
          mkdir -p release
          tar -czvf vecBox-${{ steps.tag.outputs.name }}-bin-linux-cpu-x86_64.tar.gz -C target/x86_64-unknown-linux-gnu/release vecBox

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: vecBox-${{ steps.tag.outputs.name }}-bin-linux-cpu-x86_64.tar.gz
          name: vecBox-bin-linux-cpu-x86_64.tar.gz

  linux-cuda-x64:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup CUDA
        uses: cuda-action/cuda-action@v0.11.0
        with:
          cuda-version: '12.4'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build
        run: |
          cargo build --release --features cuda --target x86_64-unknown-linux-gnu

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        run: |
          mkdir -p release
          tar -czvf vecBox-${{ steps.tag.outputs.name }}-bin-linux-cuda-x86_64.tar.gz -C target/x86_64-unknown-linux-gnu/release vecBox

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: vecBox-${{ steps.tag.outputs.name }}-bin-linux-cuda-x86_64.tar.gz
          name: vecBox-bin-linux-cuda-x86_64.tar.gz

  windows-cpu-x64:
    runs-on: windows-2025

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: |
          cargo build --release --features mkl --target x86_64-pc-windows-msvc

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path target/x86_64-pc-windows-msvc/release/vecBox.exe -DestinationPath vecBox-${{ steps.tag.outputs.name }}-bin-win-cpu-x64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: vecBox-${{ steps.tag.outputs.name }}-bin-win-cpu-x64.zip
          name: vecBox-bin-win-cpu-x64.zip

  windows-cuda-x64:
    runs-on: windows-2022

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup CUDA
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: '12.4'

      - name: Build
        run: |
          cargo build --release --features cuda --target x86_64-pc-windows-msvc

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path target/x86_64-pc-windows-msvc/release/vecBox.exe -DestinationPath vecBox-${{ steps.tag.outputs.name }}-bin-win-cuda-x64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: vecBox-${{ steps.tag.outputs.name }}-bin-win-cuda-x64.zip
          name: vecBox-bin-win-cuda-x64.zip

  macos-arm64:
    runs-on: macos-14

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: |
          cargo build --release --features metal --target aarch64-apple-darwin

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        run: |
          mkdir -p release
          tar -czvf vecBox-${{ steps.tag.outputs.name }}-bin-macos-arm64.tar.gz -C target/aarch64-apple-darwin/release vecBox

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: vecBox-${{ steps.tag.outputs.name }}-bin-macos-arm64.tar.gz
          name: vecBox-bin-macos-arm64.tar.gz

  macos-x64:
    runs-on: macos-15-intel

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build
        run: |
          cargo build --release --features accelerate --target x86_64-apple-darwin

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        run: |
          mkdir -p release
          tar -czvf vecBox-${{ steps.tag.outputs.name }}-bin-macos-x64.tar.gz -C target/x86_64-apple-darwin/release vecBox

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: vecBox-${{ steps.tag.outputs.name }}-bin-macos-x64.tar.gz
          name: vecBox-bin-macos-x64.tar.gz

  release:
    if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/main' ) || github.event.inputs.create_release == 'true' }}

    permissions:
      contents: write

    runs-on: ubuntu-latest

    needs:
      - linux-cpu-x64
      - linux-cuda-x64
      - windows-cpu-x64
      - windows-cuda-x64
      - macos-arm64
      - macos-x64

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "//;s/"//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Validate version matches tag
        run: |
          TAG_VERSION="v${{ steps.version.outputs.version }}"
          if [[ "${{ steps.tag.outputs.name }}" != "$TAG_VERSION"* ]]; then
            echo "Error: Tag name '${{ steps.tag.outputs.name }}' does not match version 'v${{ steps.version.outputs.version }}'"
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifact
          merge-multiple: true

      - name: Move artifacts
        run: |
          mkdir -p release
          mv -v artifact/*.tar.gz release/
          mv -v artifact/*.zip release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f latest
          git push origin latest --force
